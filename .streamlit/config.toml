# .streamlit/config.toml
# Bloomberg orange accent for the mini-bloomberg-terminal project.
# style_inject.py also auto-detects this from the folder name at runtime.

[theme]
base = "dark"
primaryColor = "#E07020"
backgroundColor = "#080808"
secondaryBackgroundColor = "#101014"
textColor = "#E8E8EC"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
